<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Masuk | Multimedia Pembelajaran Fotosintesis</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/login.css" />
  <link rel="stylesheet" href="css/responsive.css" />
</head>
<body>
  <nav class="navbar">
    <div class="nav-container">
      <a href="index.html" class="nav-logo"><span class="leaf">🌿</span> Fotosintesis</a>
      <button class="nav-toggle">☰</button>
      <ul class="nav-menu">
        <li><a href="index.html">Home</a></li>
        <li><a href="cp-tujuan.html">CP & Tujuan</a></li>
        <li><a href="materi.html">Materi</a></li>
        <li><a href="video.html">Video Edukasi</a></li>
        <li><a href="quiz.html">Quiz</a></li>
        <li><a href="profil.html">Profil</a></li>
      </ul>
    </div>
  </nav>

  <main class="login-wrapper">
    <div class="login-container">
      <!-- Ilustrasi -->
      <div class="login-illustration">
        <div class="big-leaf"><img src="assets/images/login.png" alt="Login"></div>
        <h2>Selamat Datang!</h2>
        <p>Masuk untuk melanjutkan pembelajaran fotosintesismu.</p>
      </div>

      <!-- Form Login -->
      <form id="loginForm" class="login-form" novalidate>
        <h2>Masuk</h2>
        <p class="form-subtitle">Silakan masukkan username dan password kamu.</p>
        <div id="alert" class="alert"></div>

        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" placeholder="Masukkan username" autocomplete="username" />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Masukkan password" autocomplete="current-password" />
        </div>

        <button type="submit" class="btn btn-primary btn-full">Masuk</button>

        <p class="form-footer">
          Belum punya akun? <a href="register.html">Daftar di sini</a>
        </p>
      </form>
    </div>
  </main>

  <footer class="footer">
    <div class="footer-bottom">
      © <span id="year"></span> Multimedia Pembelajaran Fotosintesis - IPA SMP.
    </div>
  </footer>

  <script src="js/main.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
